services:
  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ingestor-service:
    build: ./src/ingestor-service
    environment:
      NASA_API_KEY: ${NASA_API_KEY:-DEMO_KEY}
      NASA_USE_MOCK: ${NASA_USE_MOCK:-false}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_RABBITMQ_HOST: rabbitmq
      GST_LOOKBACK_DAYS: ${GST_LOOKBACK_DAYS:-180}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-60}
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notifier-service:
    build: ./src/notifier-service
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_RABBITMQ_HOST: rabbitmq
      IDEMPOTENCY_TTL_SECONDS: ${IDEMPOTENCY_TTL_SECONDS:-86400}
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ingestor-service
